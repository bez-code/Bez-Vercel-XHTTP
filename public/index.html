<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel XHTTP Relay</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            color: #000;
        }
        .status {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 5px;
            margin: 1rem 0;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            margin-right: 0.5rem;
        }
        a {
            color: #0070f3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Vercel XHTTP Relay</h1>
    <div class="status">
        <span class="status-indicator"></span>
        <strong>Status:</strong> Active
    </div>
    <p>
        This is a Vercel Edge Function that relays XHTTP traffic to a backend Xray/V2Ray server.
    </p>
    <p>
        The relay is configured and running. For more information, see the 
        <a href="https://github.com/ramynn/vercel-xhttp-relay" target="_blank">project documentation</a>.
    </p>
    
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.js';
        inject();
    </script>
</body>
</html>
